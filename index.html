<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Vr Story</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header class="header">
        <div class="container header-container">
            <a href="/index.html" class="logo">
                Vr Story
            </a>

            <!-- NAVIGATION -->
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="/explore.html">Explore</a></li>
                    <li><a href="/resources.html">Resources</a></li>
                    <li><a href="/pricing.html">Pricing</a></li>
                </ul>
            </nav>

            <!-- ACTIONS -->
            <div class="header-actions">

                <!-- ICON BUTTON -->
                <button class="icon-btn">
                    <img src="img/Vector.png" alt="icon">
                </button>

                <!-- BUTTON -->
                <a href="/start-creating.html" class="btn header-btn">
                    Start Creating
                </a>

            </div>

            <!-- BURGER -->
            <button class="burger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero hero-bg">
        <div class="container hero-container ">

            <!-- LEFT -->
            <div class="hero-content">

                <!-- DECOR -->
                <div class="hero-decor">
                    <img src="img/Holographic-1x.png" alt="">
                </div>

                <h1 class="hero-title">
                    Let’s Create <br>
                    Your Story <br>
                    Together!
                </h1>

                <p class="hero-text">
                    Vr story is an interactive tool that makes it
                    easy for anyone to produce engaging
                    digital experiences
                </p>

                <!-- BUTTONS -->
                <div class="hero-buttons">

                    <a href="/learn-more.html" class="btn btn-outline">
                        Learn More
                    </a>

                    <a href="/watch-demo.html " class="btn btn-primary">
                        <img src="img/play.png" alt="">
                        Watch Demo
                    </a>

                </div>

            </div>

            <!-- RIGHT IMAGE -->
            <div class="hero-image">
                <img src="img/future-1x.png" alt="">
            </div>

        </div>

    </section>

</body>

</html>
